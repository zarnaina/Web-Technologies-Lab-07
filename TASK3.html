<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AngularJS Lab</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-app="" ng-init="employees=[
{name:'Adeena', dept:'IT'},
{name:'Jozza', dept:'HR'},
{name:'Ahmad', dept:'Finance'},
{name:'Zarnaina', dept:'Marketing'},
{name:'Ahrar', dept:'Admin'}
]">
  <h2>Employee List</h2>
  <ul>
    <li ng-repeat="emp in employees">
      Name: {{emp.name}} - Department: {{emp.dept}}
    </li>
  </ul>

</body>
</html>
