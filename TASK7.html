<!DOCTYPE html>

<head>
  <title>Task 7 - Show/Hide Password</title>

</head>
<body ng-app="">
    
  <h2>Show / Hide Password</h2>
  Password:

  <p>Your Password: {{password}}</p>

</body>
</html>
